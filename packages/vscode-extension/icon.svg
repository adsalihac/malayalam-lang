<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Malayalam "m" character styled as icon -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003d7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="#ffffff" rx="24"/>

  <!-- Malayalam Script Styling - Abstract representation -->
  <circle cx="64" cy="64" r="50" fill="url(#grad)"/>

  <!-- Malayalam letter "മ" abstraction -->
  <path d="M 40 50 Q 40 40 50 40 Q 60 40 60 50 L 60 80 Q 60 90 50 90 Q 40 90 40 80 Z" fill="#ffffff" opacity="0.9"/>
  <path d="M 68 50 Q 68 40 78 40 Q 88 40 88 50 L 88 80 Q 88 90 78 90 Q 68 90 68 80 Z" fill="#ffffff" opacity="0.9"/>

  <!-- Decorative accent lines representing code -->
  <line x1="35" y1="100" x2="93" y2="100" stroke="#003d7a" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="108" x2="88" y2="108" stroke="#003d7a" stroke-width="1.5" opacity="0.3"/>
</svg>
